name: CI

on:
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
  pull_request:
    branches:
      - develop
      - master
      - "release/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  language-check:
    name: English-only language check (cspell)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cspell
        run: npm install -g cspell@8.19.4

      - name: Run cspell
        run: |
          cspell \
            "src/**/*.cs" \
            "tests/**/*.cs" \
            "samples/**/*.cs" \
            "scripts/**/*.sh" \
            "*.md" \
            ".github/**/*.yml" \
            --config .cspell.json \
            --no-progress \
            --no-summary

  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest
    needs: language-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore CometBFT.Client.sln

      - name: Check outdated packages
        run: |
          dotnet list package --outdated > outdated.txt
          if grep -q "^   >" outdated.txt; then
            echo "❌ Outdated direct dependencies detected:" && grep "^   >" outdated.txt && exit 1
          fi

      - name: Build (Release)
        run: dotnet build CometBFT.Client.sln --configuration Release --no-restore

      - name: Check formatting
        run: dotnet format CometBFT.Client.sln --verify-no-changes --no-restore

      - name: Run unit tests with coverage gate
        run: |
          dotnet test CometBFT.Client.sln \
            --configuration Release \
            --no-build \
            --collect "XPlat Code Coverage" \
            --logger trx \
            --results-directory TestResults \
            --filter "Category!=Integration&Category!=E2E"
          dotnet run --project tools/CometBFT.Client.CoverageGate/CometBFT.Client.CoverageGate.csproj -- TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && !env.ACT
        with:
          name: test-results
          path: TestResults/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      COMETBFT_RPC_URL: https://cosmoshub.tendermintrpc.lava.build:443
      COMETBFT_WS_URL: wss://cosmoshub.tendermintrpc.lava.build:443/websocket
      COMETBFT_GRPC_URL: cosmoshub.grpc.lava.build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore CometBFT.Client.sln

      - name: Build (Release)
        run: dotnet build CometBFT.Client.sln --configuration Release --no-restore

      - name: Run integration tests
        run: |
          dotnet test tests/CometBFT.Client.Integration.Tests/CometBFT.Client.Integration.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger trx \
            --results-directory TestResults \
            --filter "Category=Integration"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    # Public WebSocket endpoints are intermittently unreliable; advisory only.
    continue-on-error: true
    env:
      COMETBFT_RPC_URL: https://cosmoshub.tendermintrpc.lava.build:443
      COMETBFT_WS_URL: wss://cosmoshub.tendermintrpc.lava.build:443/websocket
      COMETBFT_GRPC_URL: cosmoshub.grpc.lava.build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore CometBFT.Client.sln

      - name: Build (Release)
        run: dotnet build CometBFT.Client.sln --configuration Release --no-restore

      - name: Run E2E tests
        run: |
          dotnet test tests/CometBFT.Client.E2E.Tests/CometBFT.Client.E2E.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger trx \
            --results-directory "TestResults/e2e" \
            --filter "Category=E2E"

