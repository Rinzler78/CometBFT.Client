name: CI

on:
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
  pull_request:
    branches:
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  language-check:
    name: English-only language check (cspell)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cspell
        run: npm install -g cspell@8.19.4

      - name: Run cspell
        run: |
          cspell \
            "src/**/*.cs" \
            "tests/**/*.cs" \
            "samples/**/*.cs" \
            "scripts/**/*.sh" \
            "*.md" \
            ".github/**/*.yml" \
            --config .cspell.json \
            --no-progress \
            --no-summary

  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore CometBFT.Client.sln

      - name: Check outdated packages
        run: |
          dotnet list package --outdated > outdated.txt
          if grep -q "^   >" outdated.txt; then
            echo "❌ Outdated direct dependencies detected:" && grep "^   >" outdated.txt && exit 1
          fi

      - name: Build (Release)
        run: dotnet build CometBFT.Client.sln --configuration Release --no-restore

      - name: Check formatting
        run: dotnet format CometBFT.Client.sln --verify-no-changes --no-restore

      - name: Run unit tests with coverage gate
        run: ./scripts/test.sh --no-build

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      COMETBFT_RPC_URL: https://cosmoshub.tendermintrpc.lava.build:443
      COMETBFT_WS_URL: wss://cosmoshub.tendermintrpc.lava.build:443/websocket
      COMETBFT_GRPC_URL: cosmoshub.grpc.lava.build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore CometBFT.Client.sln

      - name: Build (Release)
        run: dotnet build CometBFT.Client.sln --configuration Release --no-restore

      - name: Run integration tests
        run: |
          dotnet test tests/CometBFT.Client.Integration.Tests/CometBFT.Client.Integration.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger trx \
            --results-directory TestResults \
            --filter "Category=Integration"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    env:
      COMETBFT_RPC_URL: https://cosmoshub.tendermintrpc.lava.build:443
      COMETBFT_WS_URL: wss://cosmoshub.tendermintrpc.lava.build:443/websocket
      COMETBFT_GRPC_URL: cosmoshub.grpc.lava.build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore CometBFT.Client.sln

      - name: Build (Release)
        run: dotnet build CometBFT.Client.sln --configuration Release --no-restore

      - name: Run E2E tests
        run: |
          dotnet test tests/CometBFT.Client.E2E.Tests/CometBFT.Client.E2E.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger trx \
            --results-directory TestResults \
            --filter "Category=E2E"

  unsafe-validation:
    name: Unsafe Endpoints Validation
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ vars.COMETBFT_UNSAFE_RPC_URL != '' }}
    env:
      COMETBFT_UNSAFE_RPC_URL: ${{ vars.COMETBFT_UNSAFE_RPC_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore CometBFT.Client.sln

      - name: Build (Release)
        run: dotnet build CometBFT.Client.sln --configuration Release --no-restore

      - name: Run Unsafe integration tests
        run: |
          dotnet test tests/CometBFT.Client.Integration.Tests/CometBFT.Client.Integration.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger trx \
            --results-directory TestResults \
            --filter "Category=Integration&FullyQualifiedName~Unsafe"

  docker-validation:
    name: Docker Self-Contained Validation
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker build wrapper
        run: |
          chmod +x scripts/docker/build.sh
          ./scripts/docker/build.sh

      - name: Validate Docker test wrapper
        run: |
          chmod +x scripts/docker/test.sh
          ./scripts/docker/test.sh
