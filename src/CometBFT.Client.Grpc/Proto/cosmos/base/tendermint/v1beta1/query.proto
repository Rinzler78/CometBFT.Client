// Minimal self-contained proto for the Cosmos SDK tendermint service.
// Field numbers are authoritative (taken from cosmos/cosmos-sdk source).
// Only the fields required by the demo are declared; unknown fields are silently
// ignored by the protobuf runtime, so this is forward-compatible.

syntax = "proto3";

package cosmos.base.tendermint.v1beta1;

option csharp_namespace = "CometBFT.Client.Grpc.Proto.CosmosBase.Tendermint.V1beta1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";

// ── Service ──────────────────────────────────────────────────────────────────

service Service {
  rpc GetNodeInfo(GetNodeInfoRequest) returns (GetNodeInfoResponse);
  rpc GetSyncing(GetSyncingRequest) returns (GetSyncingResponse);
  rpc GetLatestBlock(GetLatestBlockRequest) returns (GetLatestBlockResponse);
  rpc GetLatestValidatorSet(GetLatestValidatorSetRequest) returns (GetLatestValidatorSetResponse);
}

// ── Node info ─────────────────────────────────────────────────────────────────

message GetNodeInfoRequest {}

message GetNodeInfoResponse {
  DefaultNodeInfo default_node_info = 1;
  VersionInfo application_version = 2;
}

// tendermint.p2p.DefaultNodeInfo — only the fields we use.
message DefaultNodeInfo {
  NodeProtocolVersion protocol_version = 1;
  string default_node_id = 2;
  string listen_addr = 3;
  string network = 4;
  string version = 5;
  bytes channels = 6;
  string moniker = 7;
}

// Renamed from ProtocolVersion to avoid collision with CometBFT.Client.Core.Domain.ProtocolVersion.
message NodeProtocolVersion {
  uint64 p2p = 1;
  uint64 block = 2;
  uint64 app = 3;
}

message VersionInfo {
  string name = 1;
  string app_name = 2;
  string version = 3;
  string git_commit = 4;
  string build_tags = 5;
  string go_version = 6;
  // field 7 is repeated Module build_deps — skipped
  string cosmos_sdk_version = 8;
}

// ── Syncing ──────────────────────────────────────────────────────────────────

message GetSyncingRequest {}

message GetSyncingResponse {
  bool syncing = 1;
}

// ── Latest block ─────────────────────────────────────────────────────────────

message GetLatestBlockRequest {}

message GetLatestBlockResponse {
  // field 1 is block_id — skipped
  Block block = 2;
  // field 3 is sdk_block (SDK ≥ 0.47) — skipped
}

// tendermint.types.Block — only header + data needed.
message Block {
  Header header = 1;
  Data data = 2;
}

// tendermint.types.Header — only the fields we display.
message Header {
  // field 1 is Consensus version — skipped
  string chain_id = 2;
  int64 height = 3;
  google.protobuf.Timestamp time = 4;
  // fields 5-13 are hashes — skipped
  bytes proposer_address = 14;
}

message Data {
  repeated bytes txs = 1;
}

// ── Validator set ─────────────────────────────────────────────────────────────

message GetLatestValidatorSetRequest {
  PageRequest pagination = 1;
}

message GetLatestValidatorSetResponse {
  int64 block_height = 1;
  repeated Validator validators = 2;
  // field 3 is PageResponse — skipped
}

// cosmos.base.tendermint.v1beta1.Validator (address is bech32 string).
message Validator {
  string address = 1;
  google.protobuf.Any pub_key = 2;
  int64 voting_power = 3;
  int64 proposer_priority = 4;
}

// Minimal cosmos.base.query.v1beta1.PageRequest.
message PageRequest {
  bytes key = 1;
  uint64 offset = 2;
  uint64 limit = 3;
}
