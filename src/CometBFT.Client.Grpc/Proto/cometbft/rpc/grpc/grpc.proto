// CometBFT gRPC broadcast service definition.
// Source: https://github.com/cometbft/cometbft — protocol version v0.38.9
// Path in upstream repo: proto/tendermint/rpc/grpc/types.proto

syntax = "proto3";

package cometbft.rpc.grpc;

option csharp_namespace = "Tendermint.Client.Grpc.Proto";
option go_package = "github.com/cometbft/cometbft/rpc/grpc;coregrpc";

// BroadcastAPI exposes the CometBFT gRPC broadcast endpoint.
service BroadcastAPI {
    // Ping verifies the gRPC connection to the CometBFT node.
    rpc Ping(RequestPing) returns (ResponsePing);
    // BroadcastTx submits a raw transaction and returns the ABCI check result.
    rpc BroadcastTx(RequestBroadcastTx) returns (ResponseBroadcastTx);
}

// RequestPing is the request type for the Ping RPC.
message RequestPing {}

// ResponsePing is the response type for the Ping RPC.
message ResponsePing {}

// RequestBroadcastTx carries the raw transaction bytes.
message RequestBroadcastTx {
    bytes tx = 1;
}

// ResponseBroadcastTx carries the ABCI CheckTx response.
message ResponseBroadcastTx {
    ResponseCheckTx check_tx = 1;
}

// ResponseCheckTx is the ABCI CheckTx result returned during broadcast.
message ResponseCheckTx {
    uint32 code       = 1;
    bytes  data       = 2;
    string log        = 3;
    string info       = 4;
    int64  gas_wanted = 5;
    int64  gas_used   = 6;
    string codespace  = 7;
}
