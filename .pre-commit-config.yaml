repos:
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.0
    hooks:
      - id: cspell
        name: English-only language check
        args: [--no-progress, --no-summary, --show-context, --no-must-find-files]

  - repo: local
    hooks:
      - id: branch-guard
        name: Branch guard (no direct commits to master/develop)
        language: script
        entry: .hooks/branch-guard.sh
        pass_filenames: false
        always_run: true

      - id: dotnet-restore-lock
        name: Update NuGet lock files
        language: system
        entry: dotnet restore CometBFT.Client.sln --force-evaluate
        pass_filenames: false
        files: '\.csproj$|packages\.lock\.json$'

      - id: dotnet-outdated
        name: Check outdated NuGet packages
        language: system
        entry: bash -c 'dotnet list package --outdated > /tmp/outdated.txt; if grep -q "^   >" /tmp/outdated.txt; then echo "Outdated direct dependencies detected:" && grep "^   >" /tmp/outdated.txt && exit 1; fi'
        pass_filenames: false
        files: '\.csproj$'

      - id: dotnet-vulnerable
        name: Check vulnerable NuGet packages
        language: system
        entry: bash -c 'dotnet list package --vulnerable --include-transitive > /tmp/vulnerable.txt 2>&1; if grep -q "has the following vulnerable" /tmp/vulnerable.txt; then cat /tmp/vulnerable.txt && exit 1; fi'
        pass_filenames: false
        files: '\.csproj$|packages\.lock\.json$'

      - id: dotnet-format
        name: dotnet format (lint + style)
        language: system
        entry: dotnet format CometBFT.Client.sln --verify-no-changes --no-restore
        pass_filenames: false

      - id: dotnet-build
        name: dotnet build
        language: system
        entry: dotnet build CometBFT.Client.sln --configuration Release --no-restore
        pass_filenames: false

      - id: dotnet-test
        name: dotnet test (unit)
        language: system
        entry: bash -c 'rm -rf TestResults && dotnet test CometBFT.Client.sln --configuration Release --no-build --filter "Category!=Integration&Category!=E2E" --collect "XPlat Code Coverage" --logger trx --results-directory TestResults'
        pass_filenames: false

      - id: coverage-gate
        name: Coverage gate (≥ 90 %)
        language: system
        entry: dotnet run --project tools/CometBFT.Client.CoverageGate/CometBFT.Client.CoverageGate.csproj -- TestResults
        pass_filenames: false

      - id: validate-package-restore
        name: Validate single-package NuGet restore
        language: system
        entry: ./scripts/validate-package-restore.sh
        pass_filenames: false

      - id: detect-secrets
        name: detect secrets
        language: python
        entry: detect-secrets-hook
        args: ["--baseline", ".secrets.baseline"]
        pass_filenames: true
